name: yiai-mcp-mingyu

services:
  mcp:
    container_name: yiai-mcp-mingyu
    build:
      context: .
      dockerfile: Dockerfile.mcp
      args:
        NODE_VERSION: "22.17.0"
        NODE_SHA256: "325c0f1261e0c61bcae369a1274028e9cfb7ab7949c05512c5b1e630f7e80e12"
        HTTPS_PROXY: "http://host.docker.internal:7890"
    ports:
      - "19120:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3001/health')"]
      interval: 10s
      timeout: 3s
      retries: 12
